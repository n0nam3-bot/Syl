<!DOCTYPE html>
<html>
<head>
  <title>Syl</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial;
      background: #0b1020;
      color: white;
      margin: 0;
      padding: 20px;
    }
    textarea, input, select {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 5px 0;
      cursor: pointer;
      background: #4c6fff;
      color: white;
    }
    #messages {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #333;
      padding: 10px;
      margin-bottom: 10px;
    }
    .msg { margin-bottom: 10px; }
    .user { color: #7c8cff; }
    .ai { color: #28d7a1; }
  </style>
</head>
<body>

<h2>Syl</h2>

<input id="backend" placeholder="Backend URL"/>
<button onclick="saveBackend()">Save</button>
<button onclick="testBackend()">Test</button>

<div id="status"></div>

<div id="messages"></div>

<select id="mode">
  <option value="auto">Auto</option>
  <option value="text">Text</option>
  <option value="code">Code</option>
  <option value="image">Image</option>
  <option value="video">Video</option>
</select>

<input id="title" placeholder="Title (optional)"/>
<textarea id="prompt" placeholder="Type here..."></textarea>

<button onclick="send()">Send</button>

<hr>

<h3>Local Knowledge</h3>
<textarea id="kb"></textarea>
<button onclick="addKb()">Add</button>
<button onclick="clearKb()">Clear</button>

<script>
let backend = localStorage.getItem("backend") || "https://script.google.com/macros/s/AKfycbyfISHSgTAYufMwXWj41-Upn6HT3C-EKKYalmkQWih-gNWSw4zHguY8jOFTzNU8QoX7QA/exec";
document.getElementById("backend").value = backend;

let kb = JSON.parse(localStorage.getItem("kb") || "[]");

function saveBackend() {
  backend = document.getElementById("backend").value;
  localStorage.setItem("backend", backend);
  setStatus("Saved");
}

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerText = role + ": " + text;
  document.getElementById("messages").appendChild(div);
}

function testBackend() {
  jsonp({action:"ping"}, (res)=>{
    setStatus("Connected: " + JSON.stringify(res));
  });
}

function addKb() {
  const text = document.getElementById("kb").value;
  if(!text) return;
  kb.push(text);
  localStorage.setItem("kb", JSON.stringify(kb));
  setStatus("Added KB");
}

function clearKb() {
  kb = [];
  localStorage.removeItem("kb");
  setStatus("Cleared KB");
}

function send() {
  const prompt = document.getElementById("prompt").value;
  if(!prompt) return;

  addMessage("user", prompt);

  jsonp({
    prompt: prompt,
    mode: document.getElementById("mode").value,
    title: document.getElementById("title").value,
    kb: kb
  }, (res)=>{
    if(res.ok){
      addMessage("ai", res.reply);
    } else {
      addMessage("ai", "Error: " + res.error);
    }
  });
}

/* =========================
   JSONP CORE (THE FIX)
========================= */
function jsonp(payload, callback) {
  const cbName = "cb_" + Math.random().toString(36).substring(2);

  window[cbName] = function(data){
    callback(data);
    delete window[cbName];
    script.remove();
  };

  const script = document.createElement("script");
  const url = backend + "?callback=" + cbName + "&payload=" + encodeURIComponent(JSON.stringify(payload));
  
  script.src = url;
  document.body.appendChild(script);
}
</script>

</body>
</html>
